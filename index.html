                                            {editingId ? <Icons.Check className="w-5 h-5"/> : <Icons.Plus className="w-5 h-5"/>}
                                            {editingId ? "Salvar Alterações" : "Adicionar Lançamento"}
                                        </button>
                                    </form>
                                </div>

                                {expenses.length > 0 && (
                                    <div className="neu-panel p-10 print:border-none print:shadow-none print:p-0 print:mb-6">
                                            <div className="flex flex-col md:flex-row justify-between items-center gap-8 mb-10">
                                                <div className="text-center md:text-left">
                                                    <p className="text-xs text-slate-400 uppercase font-bold mb-2 no-print tracking-widest">Total {getTotalTitle()}</p>
                                                    <p className="text-5xl font-black text-slate-700">
                                                        <span className="text-2xl text-slate-400 font-bold mr-2 align-top">{settings.currency}</span>
                                                        {formatCurrency(totalGeneral)}
                                                    </p>
                                                </div>
                                                <div className="flex gap-4 w-full md:w-auto no-print">
                                                    <button onClick={() => window.print()} className="neu-btn flex-1 md:flex-none justify-center flex items-center gap-3 px-8 py-4 rounded-2xl text-slate-600 font-bold">
                                                        <Icons.Printer className="w-5 h-5" /> Imprimir
                                                    </button>
                                                    <button onClick={exportToCSV} className="neu-btn flex-1 md:flex-none justify-center flex items-center gap-3 px-8 py-4 rounded-2xl text-blue-500 font-bold">
                                                        <Icons.Download className="w-5 h-5" /> Exportar
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            <div className="flex flex-col md:flex-row gap-8 no-print items-end md:items-center">
                                                <div className="relative flex-1 w-full group">
                                                    <div className="absolute inset-y-0 left-0 pl-6 flex items-center pointer-events-none">
                                                        <Icons.Search className="w-5 h-5 text-slate-400" />
                                                    </div>
                                                    <input 
                                                        type="text" 
                                                        placeholder="Pesquisar lançamentos..." 
                                                        value={searchTerm}
                                                        onChange={e => setSearchTerm(e.target.value)}
                                                        className="neu-input w-full pl-14 pr-6 py-4 rounded-2xl text-sm font-medium text-slate-600 placeholder-slate-400"
                                                    />
                                                </div>
                                                
                                                <div className="flex flex-wrap gap-4 w-full md:w-auto items-center">
                                                    {!searchTerm ? (
                                                        <>
                                                            <div className="flex gap-2">
                                                                <button 
                                                                    onClick={() => setFilterMode('day')}
                                                                    className={`px-6 py-3 text-xs font-bold rounded-xl transition-all ${filterMode === 'day' ? 'neu-active text-blue-500' : 'neu-btn text-slate-500'}`}
                                                                >
                                                                    Dia
                                                                </button>
                                                                <button 
                                                                    onClick={() => setFilterMode('month')}
                                                                    className={`px-6 py-3 text-xs font-bold rounded-xl transition-all ${filterMode === 'month' ? 'neu-active text-blue-500' : 'neu-btn text-slate-500'}`}
                                                                >
                                                                    Mês
                                                                </button>
                                                            </div>

                                                            {filterMode === 'day' ? (
                                                                <div className="flex items-center gap-4 neu-panel p-2 rounded-2xl">
                                                                    <button 
                                                                        onClick={handlePrevDate} 
                                                                        disabled={availableDates.indexOf(selectedDate) <= 0}
                                                                        className="p-2 text-slate-500 hover:text-blue-500 neu-btn rounded-xl disabled:opacity-30 disabled:cursor-not-allowed"
                                                                    >
                                                                        <Icons.ChevronLeft className="w-5 h-5"/>
                                                                    </button>
                                                                    
                                                                    <span className="font-bold text-slate-600 px-2 min-w-[100px] text-center text-sm">
                                                                        {selectedDate ? formatDateBR(selectedDate) : '...'}
                                                                    </span>
                                                                    
                                                                    <button 
                                                                        onClick={handleNextDate} 
                                                                        disabled={availableDates.indexOf(selectedDate) >= availableDates.length - 1}
                                                                        className="p-2 text-slate-500 hover:text-blue-500 neu-btn rounded-xl disabled:opacity-30 disabled:cursor-not-allowed"
                                                                    >
                                                                        <Icons.ChevronRight className="w-5 h-5"/>
                                                                    </button>
                                                                </div>
                                                            ) : (
                                                                <div className="flex items-center gap-4 neu-panel p-2 rounded-2xl">
                                                                    <button 
                                                                        onClick={handlePrevMonthFilter} 
                                                                        disabled={availableMonths.indexOf(selectedMonth) <= 0}
                                                                        className="p-2 text-slate-500 hover:text-blue-500 neu-btn rounded-xl disabled:opacity-30 disabled:cursor-not-allowed"
                                                                    >
                                                                        <Icons.ChevronLeft className="w-5 h-5"/>
                                                                    </button>
                                                                    
                                                                    <span className="font-bold text-slate-600 px-2 min-w-[120px] text-center text-sm capitalize">
                                                                        {selectedMonth ? formatMonthBR(selectedMonth) : '...'}
                                                                    </span>
                                                                    
                                                                    <button 
                                                                        onClick={handleNextMonthFilter} 
                                                                        disabled={availableMonths.indexOf(selectedMonth) >= availableMonths.length - 1}
                                                                        className="p-2 text-slate-500 hover:text-blue-500 neu-btn rounded-xl disabled:opacity-30 disabled:cursor-not-allowed"
                                                                    >
                                                                        <Icons.ChevronRight className="w-5 h-5"/>
                                                                    </button>
                                                                </div>
                                                            )}
                                                        </>
                                                    ) : (
                                                        <div className="neu-input text-blue-500 px-6 py-4 rounded-2xl text-sm font-bold">
                                                            Modo Busca Ativo (Global)
                                                        </div>
                                                    )}

                                                    <div className="h-8 w-px bg-slate-300 hidden md:block"></div>

                                                    <div className="flex gap-2">
                                                        <button 
                                                            onClick={() => setGroupBy('date')}
                                                            className={`px-6 py-3 text-xs font-bold rounded-xl transition-all ${groupBy === 'date' ? 'neu-active text-blue-500' : 'neu-btn text-slate-500'}`}
                                                        >
                                                            Agrupar Data
                                                        </button>
                                                        <button 
                                                            onClick={() => setGroupBy('store')}
                                                            className={`px-6 py-3 text-xs font-bold rounded-xl transition-all ${groupBy === 'store' ? 'neu-active text-blue-500' : 'neu-btn text-slate-500'}`}
                                                        >
                                                            Agrupar Loja
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                    </div>
                                )}

                                {expenses.length > 0 && (
                                    <div className="space-y-10 print:space-y-6">
                                            {groupedExpenses.map(group => (
                                                <div key={group.key} className="print-break-inside-avoid">
                                                    <div className="flex items-center justify-between mb-6 px-4">
                                                        <h3 className="text-xl font-bold text-slate-700 flex items-center gap-4">
                                                            <div className="neu-input p-2 rounded-xl text-blue-500 flex items-center justify-center">
                                                                {groupBy === 'date' ? <Icons.Calendar className="w-6 h-6 m-1" /> : (
                                                                    getStoreLogo(group.key, "w-8 h-8")
                                                                )}
                                                            </div>
                                                            {groupBy === 'date' ? formatDateBR(group.key) : group.key}
                                                        </h3>
                                                        <span className="text-base font-black text-slate-600 neu-input px-6 py-2 rounded-full">
                                                            {settings.currency} {formatCurrency(group.total)}
                                                        </span>
                                                    </div>

                                                    <div className="neu-panel rounded-3xl overflow-hidden print:shadow-none print:border print:border-slate-300 p-0">
                                                        <div className="overflow-x-auto max-h-[600px] overflow-y-auto print-scroll-fix">
                                                            <table className="w-full text-left text-sm relative border-collapse">
                                                                <thead className="sticky top-0 z-10 bg-[#e0e5ec] shadow-[0_4px_10px_rgba(0,0,0,0.05)] border-b border-white/20">
                                                                    <tr>
                                                                        {groupBy === 'date' && <th className="px-8 py-5 font-bold text-slate-400 uppercase text-xs tracking-widest">Loja</th>}
                                                                        <th className="px-8 py-5 font-bold text-slate-400 uppercase text-xs tracking-widest">Quem</th>
                                                                        <th className="px-8 py-5 font-bold text-slate-400 uppercase text-xs tracking-widest">Categoria</th>
                                                                        <th className="px-8 py-5 font-bold text-slate-400 uppercase text-xs tracking-widest">Data</th>
                                                                        <th className="px-8 py-5 font-bold text-slate-400 uppercase text-xs tracking-widest">Observações</th>
                                                                        <th className="px-8 py-5 font-bold text-slate-400 uppercase text-xs tracking-widest text-right">Valor</th>
                                                                        <th className="px-8 py-5 font-bold text-slate-400 uppercase text-xs tracking-widest text-center no-print">Ações</th>
                                                                    </tr>
                                                                </thead>
                                                                <tbody className="divide-y divide-slate-300/30">
                                                                    {group.items.map((ex, idx) => (
                                                                        <tr key={ex.id} className="hover:bg-white/30 transition-colors group">
                                                                            {groupBy === 'date' && (
                                                                                <td className="px-8 py-6 whitespace-nowrap">
                                                                                    <div className="flex items-center gap-3">
                                                                                        {getStoreLogo(ex.store, "w-6 h-6")}
                                                                                        <span className={`text-xs font-bold text-slate-600`}>
                                                                                            {ex.store}
                                                                                        </span>
                                                                                    </div>
                                                                                </td>
                                                                            )}
                                                                            <td className="px-8 py-6 text-slate-500 font-medium text-sm">{ex.employeeName || settings.employeeName}</td>
                                                                            <td className="px-8 py-6 text-slate-700 text-sm font-bold">{ex.category}</td>
                                                                            <td className="px-8 py-6 whitespace-nowrap text-slate-400 font-medium text-sm">
                                                                                {formatDateBR(ex.date)}
                                                                            </td>
                                                                            <td className="px-8 py-6">
                                                                                <div className="font-medium text-slate-500 leading-tight">
                                                                                    {ex.notes || ex.description || "-"}
                                                                                </div>
                                                                            </td>
                                                                            <td className="px-8 py-6 text-right font-black text-slate-700 text-base">
                                                                                {formatCurrency(ex.amount)}
                                                                            </td>
                                                                            <td className="px-8 py-6 text-center no-print">
                                                                                <div className="flex justify-center gap-3 opacity-0 group-hover:opacity-100 transition-all transform translate-y-1 group-hover:translate-y-0">
                                                                                    <button onClick={() => duplicateExpense(ex)} className="neu-btn p-2 text-slate-400 hover:text-blue-500 rounded-xl" title="Duplicar">
                                                                                        <Icons.Copy className="w-5 h-5" />
                                                                                    </button>
                                                                                    <button onClick={() => startEdit(ex)} className="neu-btn p-2 text-slate-400 hover:text-orange-500 rounded-xl" title="Editar">
                                                                                        <Icons.Edit className="w-5 h-5" />
                                                                                    </button>
                                                                                </div>
                                                                            </td>
                                                                        </tr>
                                                                    ))}
                                                                </tbody>
                                                            </table>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                    </div>
                                )}
                                
                                {expenses.length === 0 && (
                                    <div className="text-center py-32 rounded-[3rem] neu-input no-print flex flex-col items-center justify-center text-slate-400 m-8">
                                        <div className="neu-panel p-8 rounded-full mb-6"><Icons.FileSpreadsheet className="w-12 h-12 text-blue-400"/></div>
                                        <p className="font-bold text-slate-500 text-xl">Nenhum lançamento no banco.</p>
                                        <button 
                                            onClick={handleEmptyStateRestore} 
                                            className="mt-8 px-10 py-5 neu-btn-primary rounded-2xl flex items-center gap-3 text-lg"
                                        >
                                            <Icons.CloudUpload className="w-6 h-6" /> Importar Backup
                                        </button>
                                    </div>
                                )}
                            </>
                        )}
                    </div>

                    {showBackupOptions && (
                         <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/40 backdrop-blur-md p-4 animate-in fade-in zoom-in no-print">
                            <div className="neu-panel w-full max-w-sm overflow-hidden relative p-10 text-center">
                                <div className="mx-auto w-20 h-20 neu-input rounded-3xl flex items-center justify-center mb-8 text-blue-500">
                                    <Icons.Save className="w-10 h-10" />
                                </div>
                                <h3 className="text-2xl font-black text-slate-700 mb-3">Salvar Backup</h3>
                                <p className="text-base text-slate-500 mb-10 font-medium">Como deseja salvar seus dados?</p>
                                
                                <div className="grid grid-cols-1 gap-6">
                                    <button onClick={saveToComputer} className="neu-btn w-full py-5 text-slate-600 font-bold rounded-2xl flex items-center justify-center gap-4 text-lg">
                                        <Icons.HardDrive className="w-6 h-6 text-slate-400" />
                                        <span>No Computador</span>
                                    </button>

                                    <button onClick={saveToCloud} className="neu-btn w-full py-5 text-blue-600 font-bold rounded-2xl flex items-center justify-center gap-4 text-lg">
                                        <Icons.CloudUpload className="w-6 h-6" />
                                        <span>Salvar Nuvem</span>
                                    </button>
                                </div>

                                <button onClick={() => setShowBackupOptions(false)} className="mt-10 text-slate-400 hover:text-slate-600 font-bold uppercase tracking-widest text-sm">
                                    Cancelar
                                </button>
                            </div>
                        </div>
                    )}
                    
                    {isSettingsOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-md no-print">
                            <div className="neu-panel w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-8 pb-6 flex justify-between items-center">
                                    <h3 className="text-2xl font-black text-slate-700 flex items-center gap-4">
                                        <div className="p-3 neu-input rounded-2xl text-blue-500"><Icons.Settings className="w-6 h-6"/></div>
                                        Ajustes
                                    </h3>
                                    <button onClick={() => setIsSettingsOpen(false)} className="text-slate-400 hover:text-slate-600 neu-btn p-3 rounded-2xl">
                                        <Icons.X className="w-6 h-6" />
                                    </button>
                                </div>
                                
                                <div className="p-8 space-y-10 overflow-y-auto">
                                    <div className="space-y-4">
                                        <h4 className="text-sm font-bold text-slate-400 uppercase tracking-widest">Identificação</h4>
                                        <div>
                                            <input type="text" placeholder="Nome do Funcionário" value={settings.employeeName} onChange={e => setSettings({...settings, employeeName: e.target.value})} 
                                                className="neu-input w-full p-5 rounded-2xl font-bold text-slate-700 text-lg" />
                                        </div>
                                    </div>

                                    <div className="space-y-4 pt-4">
                                        <h4 className="text-sm font-bold text-slate-400 uppercase tracking-widest">Backup do PC</h4>
                                        
                                        <div>
                                            <button onClick={triggerRestore} className="flex items-center justify-center gap-3 w-full py-5 neu-btn text-slate-600 font-bold rounded-2xl text-lg">
                                                <Icons.Upload className="w-6 h-6" /> Restaurar Arquivo
                                            </button>
                                            <input type="file" ref={fileInputRef} onChange={handleRestoreFile} accept=".json" className="hidden" />
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="p-8 pt-4">
                                    <button onClick={() => setIsSettingsOpen(false)} className="w-full py-5 neu-btn-primary font-bold rounded-2xl text-lg">
                                        Concluir
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
