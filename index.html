                                                <div>
                                                    <p className="text-[10px] md:text-xs text-slate-500 uppercase font-bold mb-1 no-print tracking-widest">Total {getTotalTitle()}</p>
                                                    <p className="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white tracking-tight">
                                                        <span className="text-xl md:text-2xl text-slate-400 font-bold mr-2 align-top">{settings.currency}</span>
                                                        {formatCurrency(totalGeneral)}
                                                    </p>
                                                </div>
                                                
                                                {/* UX Melhoria 2: Botão de Partilha WhatsApp e Exportação */}
                                                <div className="flex flex-wrap lg:flex-nowrap gap-2 md:gap-3 w-full lg:w-auto no-print">
                                                    <button onClick={handleCopySummary} className="material-btn flex-1 lg:flex-none justify-center flex items-center gap-2 px-4 md:px-6 py-2.5 md:py-3 rounded-xl text-emerald-700 dark:text-emerald-400 font-bold border-emerald-200 dark:border-emerald-800 hover:bg-emerald-50 dark:hover:bg-emerald-900/30">
                                                        <Icons.MessageCircle className="w-4 h-4 md:w-5 md:h-5" /> <span className="text-xs md:text-sm">Copiar Resumo</span>
                                                    </button>
                                                    <button onClick={() => window.print()} className="material-btn hidden md:flex flex-1 lg:flex-none justify-center items-center gap-2 px-4 md:px-6 py-2.5 md:py-3 rounded-xl text-slate-700 font-bold">
                                                        <Icons.Printer className="w-4 h-4 md:w-5 md:h-5" /> <span className="text-xs md:text-sm">Imprimir</span>
                                                    </button>
                                                    <button onClick={exportToCSV} className="material-btn-primary flex-1 lg:flex-none justify-center flex items-center gap-2 px-4 md:px-6 py-2.5 md:py-3 rounded-xl font-bold">
                                                        <Icons.Download className="w-4 h-4 md:w-5 md:h-5" /> <span className="text-xs md:text-sm">Exportar</span>
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            <div className="flex flex-col lg:flex-row gap-4 md:gap-6 no-print items-start lg:items-center">
                                                <div className="relative w-full lg:flex-1 group">
                                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Icons.Search className="w-5 h-5 text-slate-400" /></div>
                                                    <input type="text" placeholder="Pesquisar lançamentos..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="material-input w-full pl-12 pr-4 py-3 rounded-xl text-sm font-medium text-slate-700 placeholder-slate-400" />
                                                </div>
                                                
                                                <div className="flex flex-col sm:flex-row gap-3 md:gap-4 w-full lg:w-auto items-start sm:items-center">
                                                    {!searchTerm ? (
                                                        <div className="flex flex-wrap gap-3 items-center w-full sm:w-auto">
                                                            <div className="flex gap-1 bg-slate-100 dark:bg-slate-800/50 p-1 rounded-xl border border-slate-200 dark:border-slate-700 w-full sm:w-auto justify-center">
                                                                <button onClick={() => setFilterMode('late')} className={`flex-1 sm:flex-none px-3 py-2 text-xs font-bold rounded-lg transition-all flex items-center justify-center gap-1 ${filterMode === 'late' ? 'bg-red-500 text-white shadow-sm animate-pulse' : 'text-slate-500 hover:text-red-500'}`}><Icons.AlertTriangle className="w-3 h-3" /> Atrasos</button>
                                                                <button onClick={() => setFilterMode('day')} className={`flex-1 sm:flex-none px-3 py-2 text-xs font-bold rounded-lg transition-all ${filterMode === 'day' ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Dia</button>
                                                                <button onClick={() => setFilterMode('month')} className={`flex-1 sm:flex-none px-3 py-2 text-xs font-bold rounded-lg transition-all ${filterMode === 'month' ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Mês</button>
                                                            </div>

                                                            {filterMode === 'day' && (
                                                                <div className="flex items-center justify-between sm:justify-start gap-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-1.5 rounded-xl shadow-sm w-full sm:w-auto">
                                                                    <button onClick={handlePrevDate} disabled={availableDates.indexOf(selectedDate) <= 0} className="p-1.5 text-slate-500 hover:text-blue-600 disabled:opacity-30 transition-colors"><Icons.ChevronLeft className="w-4 h-4"/></button>
                                                                    <span className="font-bold text-slate-700 dark:text-slate-200 px-2 text-xs md:text-sm tracking-tight">{selectedDate ? formatDateBR(selectedDate) : '...'}</span>
                                                                    <button onClick={handleNextDate} disabled={availableDates.indexOf(selectedDate) >= availableDates.length - 1} className="p-1.5 text-slate-500 hover:text-blue-600 disabled:opacity-30 transition-colors"><Icons.ChevronRight className="w-4 h-4"/></button>
                                                                </div>
                                                            )}

                                                            {filterMode === 'month' && (
                                                                <div className="flex items-center justify-between sm:justify-start gap-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-1.5 rounded-xl shadow-sm w-full sm:w-auto">
                                                                    <button onClick={handlePrevMonthFilter} disabled={availableMonths.indexOf(selectedMonth) <= 0} className="p-1.5 text-slate-500 hover:text-blue-600 disabled:opacity-30 transition-colors"><Icons.ChevronLeft className="w-4 h-4"/></button>
                                                                    <span className="font-bold text-slate-700 dark:text-slate-200 px-2 text-xs md:text-sm capitalize tracking-tight">{selectedMonth ? formatMonthBR(selectedMonth) : '...'}</span>
                                                                    <button onClick={handleNextMonthFilter} disabled={availableMonths.indexOf(selectedMonth) >= availableMonths.length - 1} className="p-1.5 text-slate-500 hover:text-blue-600 disabled:opacity-30 transition-colors"><Icons.ChevronRight className="w-4 h-4"/></button>
                                                                </div>
                                                            )}
                                                        </div>
                                                    ) : (
                                                        <div className="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-blue-800 px-4 py-2.5 rounded-xl text-xs md:text-sm font-bold w-full sm:w-auto text-center">Modo Busca Ativo</div>
                                                    )}

                                                    <div className="flex gap-1 bg-slate-100 dark:bg-slate-800/50 p-1 rounded-xl border border-slate-200 dark:border-slate-700 w-full sm:w-auto justify-center">
                                                        <button onClick={() => setGroupBy('date')} className={`flex-1 sm:flex-none px-3 py-2 text-xs font-bold rounded-lg transition-all ${groupBy === 'date' ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Agrupar Data</button>
                                                        <button onClick={() => setGroupBy('store')} className={`flex-1 sm:flex-none px-3 py-2 text-xs font-bold rounded-lg transition-all ${groupBy === 'store' ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Agrupar Loja</button>

                                                </div>
                                            </div>
                                    </div>
                                )}

                                {expenses.length > 0 && (
                                    <div className="space-y-6 md:space-y-8 print:space-y-6">
                                            {groupedExpenses.length === 0 && filterMode === 'late' && (
                                                <div className="text-center py-10 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800 rounded-2xl md:rounded-[2rem]">
                                                    <Icons.Check className="w-10 h-10 md:w-12 md:h-12 text-emerald-500 mx-auto mb-3 md:mb-4" />

                                                    <p className="text-sm md:text-base text-emerald-600 dark:text-emerald-500">Nenhum pagamento atrasado encontrado.</p>
                                                </div>
                                            )}
                                    
                                            {groupedExpenses.map(group => (

                                                            <div className="bg-blue-50 dark:bg-blue-900/30 p-1.5 md:p-2 rounded-lg text-blue-600 dark:text-blue-400 flex items-center justify-center">
                                                                {groupBy === 'date' ? <Icons.Calendar className="w-4 h-4 md:w-5 md:h-5 m-0.5" /> : getStoreLogo(group.key, "w-5 h-5 md:w-6 md:h-6")}
                                                            </div>
                                                            {groupBy === 'date' ? formatDateBR(group.key) : group.key}

                                                        <span className="text-xs md:text-sm font-extrabold text-slate-900 dark:text-white bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 md:px-4 py-1.5 rounded-full">
                                                            {settings.currency} {formatCurrency(group.total)}
                                                        </span>
                                                    </div>

                                                    <div className="material-panel overflow-hidden print:shadow-none print:border print:border-slate-300">
                                                        <div className="overflow-x-auto max-h-[600px] overflow-y-auto print-scroll-fix">
                                                            <table className="w-full text-left text-sm relative border-collapse">
                                                                <thead className="sticky top-0 z-10 bg-slate-50 dark:bg-slate-900/90 shadow-[0_1px_2px_rgba(0,0,0,0.05)] border-b border-slate-200 dark:border-slate-700">
                                                                    <tr>
                                                                        {groupBy === 'date' && <th className="px-4 md:px-6 py-3 md:py-4 font-bold text-slate-500 dark:text-slate-400 uppercase text-[10px] md:text-xs tracking-widest whitespace-nowrap">Loja</th>}
                                                                        <th className="px-4 md:px-6 py-3 md:py-4 font-bold text-slate-500 dark:text-slate-400 uppercase text-[10px] md:text-xs tracking-widest whitespace-nowrap">Status</th>
                                                                        <th className="px-4 md:px-6 py-3 md:py-4 font-bold text-slate-500 dark:text-slate-400 uppercase text-[10px] md:text-xs tracking-widest whitespace-nowrap">Categoria</th>
                                                                        <th className="px-4 md:px-6 py-3 md:py-4 font-bold text-slate-500 dark:text-slate-400 uppercase text-[10px] md:text-xs tracking-widest">Observações</th>
                                                                        <th className="px-4 md:px-6 py-3 md:py-4 font-bold text-slate-500 dark:text-slate-400 uppercase text-[10px] md:text-xs tracking-widest whitespace-nowrap">Previsão</th>
                                                                        <th className="px-4 md:px-6 py-3 md:py-4 font-bold text-slate-500 dark:text-slate-400 uppercase text-[10px] md:text-xs tracking-widest text-right whitespace-nowrap">Valor</th>
                                                                        <th className="px-4 md:px-6 py-3 md:py-4 font-bold text-slate-500 dark:text-slate-400 uppercase text-[10px] md:text-xs tracking-widest text-center no-print">Ações</th>
                                                                    </tr>
                                                                </thead>
                                                                <tbody className="divide-y divide-slate-100 dark:divide-slate-700/50 bg-white dark:bg-slate-900/30">
                                                                    {group.items.map((ex, idx) => {
                                                                        const status = getPaymentStatus(ex);
                                                                        const expectedDate = getExpectedDate(ex);
                                                                        
                                                                        return (
                                                                        <tr key={ex.id} className={`hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors group ${status.isLate ? 'bg-red-50/20 dark:bg-red-900/10' : ''}`}>
                                                                            {groupBy === 'date' && (
                                                                                <td className="px-4 md:px-6 py-3 md:py-4 whitespace-nowrap">
                                                                                    <div className="flex items-center gap-2 md:gap-3">
                                                                                        {getStoreLogo(ex.store, "w-5 h-5 md:w-6 md:h-6")}
                                                                                        <span className="text-xs md:text-sm font-bold text-slate-700 dark:text-slate-300">{ex.store}</span>
                                                                                    </div>
                                                                                </td>
                                                                            )}
                                                                            
                                                                            <td className="px-4 md:px-6 py-3 md:py-4 whitespace-nowrap">
                                                                                <div className="flex flex-col gap-1 items-start">
                                                                                    <span className={`text-[9px] md:text-[10px] px-2 py-0.5 rounded border font-bold ${status.color}`}>{status.label}</span>
                                                                                </div>
                                                                            </td>

                                                                            <td className="px-4 md:px-6 py-3 md:py-4 text-slate-900 dark:text-white text-xs md:text-sm font-bold whitespace-nowrap">
                                                                                <span className="bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded">{ex.category}</span>
                                                                            </td>
                                                                            <td className="px-4 md:px-6 py-3 md:py-4 min-w-[150px]">
                                                                                <div className="font-medium text-slate-500 dark:text-slate-400 text-xs md:text-sm leading-tight">{ex.notes || ex.description || "-"}</div>
                                                                            </td>
                                                                            
                                                                            <td className="px-4 md:px-6 py-3 md:py-4 whitespace-nowrap">
                                                                                {(isPayjoy(ex) || isCrefaz(ex)) ? (
                                                                                    <div className={`flex items-center gap-1 md:gap-2 font-bold text-xs md:text-sm ${status.isLate && !ex.received ? 'text-red-600 dark:text-red-400' : 'text-slate-600 dark:text-slate-400'}`}>
                                                                                        <Icons.Clock className="w-3 h-3 md:w-4 md:h-4 text-slate-400 opacity-70" />
                                                                                        {formatDateBR(expectedDate)}
                                                                                    </div>
                                                                                ) : (
                                                                                    <span className="text-slate-300 dark:text-slate-600 font-bold">-</span>
                                                                                )}
                                                                            </td>

                                                                            <td className="px-4 md:px-6 py-3 md:py-4 text-right font-extrabold text-slate-900 dark:text-white text-sm md:text-base whitespace-nowrap">
                                                                                {formatCurrency(ex.amount)}
                                                                            </td>
                                                                            <td className="px-4 md:px-6 py-3 md:py-4 text-center no-print">
                                                                                <div className="flex justify-center gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-all md:transform md:translate-y-1 md:group-hover:translate-y-0">
                                                                                    <button onClick={() => initiateEdit(ex)} className="material-btn p-1.5 md:p-2 text-slate-500 hover:text-orange-500 rounded-lg" title="Editar">
                                                                                        <Icons.Edit className="w-4 h-4" />
                                                                                    </button>
                                                                                </div>
                                                                            </td>
                                                                        </tr>
                                                                    )})}
                                                                </tbody>
                                                            </table>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                    </div>
                                )}
                                
                                {expenses.length === 0 && (
                                    <div className="text-center py-16 md:py-24 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl md:rounded-[2rem] bg-slate-50 dark:bg-slate-800/30 no-print flex flex-col items-center justify-center mt-6">
                                        <div className="bg-white dark:bg-slate-800 p-4 md:p-6 rounded-full shadow-sm mb-4 md:mb-6 border border-slate-100 dark:border-slate-700"><Icons.FileSpreadsheet className="w-10 h-10 md:w-12 md:h-12 text-blue-500"/></div>
                                        <p className="font-extrabold text-slate-700 dark:text-white text-lg md:text-xl tracking-tight">Nenhum lançamento no banco.</p>
                                        <p className="text-slate-500 dark:text-slate-400 mt-2 font-medium text-sm md:text-base">Os dados não foram encontrados ou o sistema está vazio.</p>
                                        <button onClick={handleEmptyStateRestore} className="mt-6 md:mt-8 px-6 md:px-8 py-3 md:py-4 material-btn-primary rounded-xl flex items-center gap-2 md:gap-3 text-sm md:text-base font-bold">
                                            <Icons.CloudUpload className="w-5 h-5" /> Importar Backup
                                        </button>
                                    </div>
                                )}
                            </>
                        )}
                    </div>

                    {showBackupOptions && (
                         <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-in fade-in zoom-in no-print">
                            <div className="material-panel dark:bg-slate-800 w-full max-w-sm overflow-hidden relative p-6 md:p-8 text-center shadow-2xl">
                                <div className="mx-auto w-12 h-12 md:w-16 h-16 bg-blue-50 dark:bg-blue-900/30 border border-blue-100 dark:border-blue-800 rounded-xl md:rounded-2xl flex items-center justify-center mb-4 md:mb-6 text-blue-600 dark:text-blue-400">
                                    <Icons.Save className="w-6 h-6 md:w-8 h-8" />
                                </div>
                                <h3 className="text-xl md:text-2xl font-extrabold text-slate-900 dark:text-white mb-2 tracking-tight">Salvar Backup</h3>
                                <p className="text-xs md:text-sm text-slate-500 dark:text-slate-400 mb-6 md:mb-8 font-medium">Como deseja salvar seus dados?</p>
                                
                                <div className="grid grid-cols-1 gap-3 md:gap-4">
                                    <button onClick={saveToComputer} className="material-btn w-full py-3 md:py-4 text-slate-700 font-bold rounded-xl flex items-center justify-center gap-3 text-sm md:text-base">
                                        <Icons.HardDrive className="w-5 h-5 text-slate-500" /> <span>No Computador</span>
                                    </button>
                                    <button onClick={saveToCloud} className="material-btn-primary w-full py-3 md:py-4 font-bold rounded-xl flex items-center justify-center gap-3 text-sm md:text-base">
                                        <Icons.CloudUpload className="w-5 h-5" /> <span>Salvar Nuvem</span>
                                    </button>
                                </div>
                                <button onClick={() => setShowBackupOptions(false)} className="mt-6 md:mt-8 text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 font-bold uppercase tracking-widest text-[10px] md:text-xs transition-colors">Cancelar</button>
                            </div>
                        </div>
                    )}
                    
                    {isSettingsOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm no-print">
                            <div className="material-panel dark:bg-slate-800 w-full max-w-md overflow-hidden flex flex-col max-h-[90vh] shadow-2xl">
                                <div className="p-5 md:p-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50/50 dark:bg-slate-900/50">
                                    <h3 className="text-lg md:text-xl font-extrabold text-slate-900 dark:text-white flex items-center gap-3 tracking-tight">
                                        <div className="p-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg text-blue-600 dark:text-blue-400 shadow-sm"><Icons.Settings className="w-4 h-4 md:w-5 h-5"/></div> Ajustes
                                    </h3>
                                    <button onClick={() => setIsSettingsOpen(false)} className="text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors p-2"><Icons.X className="w-5 h-5" /></button>
                                </div>
                                
                                <div className="p-5 md:p-6 space-y-6 md:space-y-8 overflow-y-auto">
                                    <div className="space-y-3">
                                        <h4 className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-widest">Identificação</h4>
                                        <div>
                                            <input type="text" placeholder="Nome do Funcionário" value={settings.employeeName} onChange={e => setSettings({...settings, employeeName: e.target.value})}
                                                className="material-input w-full p-3 md:p-4 rounded-xl font-bold text-slate-900 text-sm md:text-base" />
                                        </div>
                                    </div>
                                    <div className="space-y-3 pt-4 border-t border-slate-100 dark:border-slate-700">
                                        <h4 className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-widest">Segurança</h4>
                                        <div>
                                            <label className="text-xs text-slate-500 font-bold mb-1 block">Senha de Confirmação de Recebimento</label>
                                            <input type="password" placeholder="Senha para confirmar recebimentos" value={settings.receiptPassword || ''} onChange={e => setSettings({...settings, receiptPassword: e.target.value})}
                                                className="material-input w-full p-3 md:p-4 rounded-xl font-bold text-slate-900 text-sm md:text-base" />
                                        </div>
                                        <div>
                                            <label className="text-xs text-slate-500 font-bold mb-1 block">Senha de Edição de Lançamentos</label>
                                            <input type="password" placeholder="Senha para editar lançamentos" value={settings.editPassword || ''} onChange={e => setSettings({...settings, editPassword: e.target.value})}
                                                className="material-input w-full p-3 md:p-4 rounded-xl font-bold text-slate-900 text-sm md:text-base" />
                                        </div>
                                    </div>
                                    <div className="space-y-3 pt-4 border-t border-slate-100 dark:border-slate-700">
                                        <h4 className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-widest">Backup do PC</h4>
                                        <div>
                                            <button onClick={triggerRestore} className="flex items-center justify-center gap-2 w-full py-3 md:py-4 material-btn text-slate-700 font-bold rounded-xl text-sm">
                                                <Icons.Upload className="w-4 h-4 md:w-5 h-5 text-slate-500" /> Restaurar Arquivo
                                            </button>
                                            <input type="file" ref={fileInputRef} onChange={handleRestoreFile} accept=".json" className="hidden" />
                                        </div>
                                    </div>
                                </div>

                                <div className="p-5 md:p-6 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-700">
                                    <button onClick={() => { localStorage.setItem('odoo_fast_settings', JSON.stringify(settings)); setIsSettingsOpen(false); showToast("Configurações salvas!", "success"); }} className="w-full py-3 md:py-4 material-btn-primary font-bold rounded-xl text-sm md:text-base tracking-wide">Salvar e Fechar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* UX Melhoria 1: Menu de Navegação Inferior (Apenas Mobile) */}
                    <div className="md:hidden fixed bottom-0 left-0 w-full bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 z-[80] flex justify-around items-center p-2 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <button onClick={() => setCurrentView('dashboard')} className={`flex flex-col items-center justify-center w-16 p-1 transition-colors ${currentView==='dashboard'?'text-blue-600 dark:text-blue-400':'text-slate-500 dark:text-slate-400'}`}>
                            <div className={`p-1.5 rounded-full ${currentView==='dashboard'?'bg-blue-50 dark:bg-blue-900/30':''}`}><Icons.Home className="w-5 h-5"/></div>
                            <span className="text-[9px] font-bold mt-0.5">Início</span>
                        </button>
                        <button onClick={() => setCurrentView('calendar')} className={`flex flex-col items-center justify-center w-16 p-1 transition-colors ${currentView==='calendar'?'text-blue-600 dark:text-blue-400':'text-slate-500 dark:text-slate-400'}`}>
                            <div className={`p-1.5 rounded-full ${currentView==='calendar'?'bg-blue-50 dark:bg-blue-900/30':''}`}><Icons.Calendar className="w-5 h-5"/></div>
                            <span className="text-[9px] font-bold mt-0.5">Calendário</span>
                        </button>
                        <button onClick={() => setCurrentView('analytics')} className={`flex flex-col items-center justify-center w-16 p-1 transition-colors ${currentView==='analytics'?'text-blue-600 dark:text-blue-400':'text-slate-500 dark:text-slate-400'}`}>
                            <div className={`p-1.5 rounded-full ${currentView==='analytics'?'bg-blue-50 dark:bg-blue-900/30':''}`}><Icons.Chart className="w-5 h-5"/></div>
                            <span className="text-[9px] font-bold mt-0.5">Análise</span>
                        </button>
                        <button onClick={() => setCurrentView('payments_report')} className={`flex flex-col items-center justify-center w-16 p-1 transition-colors ${currentView==='payments_report'?'text-blue-600 dark:text-blue-400':'text-slate-500 dark:text-slate-400'}`}>
                            <div className={`p-1.5 rounded-full ${currentView==='payments_report'?'bg-blue-50 dark:bg-blue-900/30':''}`}><Icons.FileSpreadsheet className="w-5 h-5"/></div>
                            <span className="text-[9px] font-bold mt-0.5">Relatório</span>
                        </button>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
