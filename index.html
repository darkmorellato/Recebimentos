            background: #ffffff;

            background: #ffffff;

        .dark .material-input {
            background: #0f172a;
            border-color: #334155;
            color: #f8fafc;
        }
        .dark .material-input:focus {
            background: #1e293b;
            border-color: #3B82F6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .material-btn {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #475569;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .material-btn:hover { background: #f1f5f9; border-color: #cbd5e1; color: #0f172a; }

        .dark .material-btn {
            background: #1e293b;
            border-color: #334155;
            color: #cbd5e1;
        }
        .dark .material-btn:hover { background: #334155; border-color: #475569; color: #ffffff; }

        }
        .material-btn-primary:active { transform: translateY(1px); }

        .progress-track {
            background: #f1f5f9;

            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        .dark .progress-track { background: #334155; border-color: #475569; }

            background: #2563eb;
            height: 100%;

        // --- UTILS (REGRAS DE NEGÓCIO E DATAS) ---
        const getTodayLocal = () => {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const formatDateBR = (dateString) => {
            if (!dateString) return "";
            const [year, month, day] = dateString.split('-');
            return `${day}/${month}/${year}`;
        };

        const formatMonthBR = (yearMonth) => {
            if (!yearMonth) return "";
            const [year, month] = yearMonth.split('-');
            const date = new Date(parseInt(year), parseInt(month) - 1, 1);
            const monthName = date.toLocaleDateString('pt-BR', { month: 'long' });
            return `${monthName.charAt(0).toUpperCase() + monthName.slice(1)} ${year}`;
        };

        const formatCurrency = (value) => {
            return new Intl.NumberFormat('pt-BR', { style: 'decimal', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(value);
        };

        // Prazos de recebimento em dias corridos por tipo de loja e dia da semana
        const PRAZO_DARK_SABADO = 11;   // Loja Dark, lançado no sábado
        const PRAZO_DARK = 10;           // Loja Dark, demais dias
        const PRAZO_NORMAL_SABADO = 9;  // Lojas normais, lançado no sábado
        const PRAZO_NORMAL = 7;          // Lojas normais, demais dias

        // Funções para garantir compatibilidade total com registos antigos e erros de digitação
        // Nota: "vrefaz" é mantido para compatibilidade com dados antigos com erro de digitação
        const isCrefaz = (ex) => {
            const cat = String(ex.category || ex.description || "").toLowerCase();
            return cat.includes("crefaz") || cat.includes("vrefaz");
        };

        const isPayjoy = (ex) => {
            const cat = String(ex.category || ex.description || "").toLowerCase();
            return cat.includes("payjoy");
        };

        const getExpectedDate = (ex) => {
            if (!ex || !ex.date) return "";
            const dateStr = ex.date;
            
            if (isCrefaz(ex)) return dateStr;
            
            if (isPayjoy(ex)) {
                let d = new Date(dateStr + 'T12:00:00'); 
                let dayOfWeek = d.getDay(); // 0 = Domingo, 1 = Segunda, ..., 6 = Sábado
                
                const store = ex.store || "";
                if (store.includes("Dark")) {
                    d.setDate(d.getDate() + (dayOfWeek === 6 ? PRAZO_DARK_SABADO : PRAZO_DARK));
                } else {
                    // Lojas normais: Dom Pedro II, Realme, Xv de Novembro, Premium, Kassouf
                    d.setDate(d.getDate() + (dayOfWeek === 6 ? PRAZO_NORMAL_SABADO : PRAZO_NORMAL));
                }
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            }
            return dateStr; 
        };

        const getPaymentStatus = (ex) => {
            if (ex.received) return { label: 'Recebido', color: 'text-emerald-700 bg-emerald-50 dark:bg-emerald-900/30 border-emerald-200 dark:border-emerald-800', isLate: false };
            const expectedDate = getExpectedDate(ex);
            const today = getTodayLocal();
            if (expectedDate < today) return { label: 'Atrasado', color: 'text-red-700 dark:text-red-400 bg-red-50 dark:bg-red-900/30 border-red-300 dark:border-red-800', isLate: true };
            return { label: 'Pendente', color: 'text-orange-600 dark:text-orange-400 bg-orange-50 dark:bg-orange-900/30 border-orange-200 dark:border-orange-800', isLate: false };
        };

        const getStoreLogo = (storeName, className = "w-6 h-6") => {
             const src = STORE_IMAGES[storeName] || STORE_IMAGES["default"];
             return (
                 <img 
                    src={src} 
                    alt={storeName} 
                    className={`${className} rounded-full object-cover border border-slate-200 dark:border-slate-700 shadow-sm bg-white`} 
                    onError={(e) => {
                        e.target.onerror = null; 
                        e.target.src = `https://ui-avatars.com/api/?name=${storeName}&background=f8fafc&color=2563eb&bold=true`;
                    }}
                />
             );
        };

        // --- COMPONENTS ---
        const DateInput = ({ value, onChange, required, className, placeholder = "dd/mm/aaaa" }) => {
            const [inputType, setInputType] = useState('text');
            return (
                <div className="relative w-full group">
                    <input
                        type={inputType}
                        required={required}
                        value={inputType === 'text' && value ? formatDateBR(value) : value}
                        onChange={onChange}
                        onFocus={(e) => { setInputType('date'); if (e.target.showPicker) { try { e.target.showPicker(); } catch (err) {} } }}
                        onBlur={() => setInputType('text')}
                        placeholder={placeholder}
                        className={className}
                    />
                    {inputType === 'text' && (
                        <div className="absolute right-5 top-1/2 transform -translate-y-1/2 pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
                            <Icons.Calendar className="w-5 h-5" />
                        </div>
                    )}
                </div>
            );
        };

        const ToastContainer = ({ toasts, removeToast }) => (
            <div className="fixed top-4 right-4 z-[100] flex flex-col gap-3 pointer-events-none">
                {toasts.map(toast => (
                    <div key={toast.id} className={`pointer-events-auto flex items-center gap-3 px-5 py-4 rounded-xl material-panel dark:bg-slate-800 transform transition-all duration-300 animate-in slide-in-from-right fade-in ${
                        toast.type === 'error' ? 'text-red-600 dark:text-red-400 border-l-4 border-l-red-500' : 
                        toast.type === 'success' ? 'text-emerald-600 dark:text-emerald-400 border-l-4 border-l-emerald-500' : 'text-blue-600 dark:text-blue-400 border-l-4 border-l-blue-500'
                    }`}>
                        <div className="p-2 rounded-full bg-slate-50 dark:bg-slate-700/50">
                            {toast.type === 'error' ? <Icons.AlertCircle className="w-5 h-5"/> : 
                             toast.type === 'success' ? <Icons.Check className="w-5 h-5"/> : 
                             <Icons.AlertCircle className="w-5 h-5"/>}
                        </div>
                        <div>
                            <p className="font-semibold text-sm text-slate-700 dark:text-slate-200">{toast.message}</p>
                        </div>
                        
                        {toast.action && (
                            <button onClick={() => { toast.action.onClick(); removeToast(toast.id); }} className="ml-2 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 rounded-lg text-xs font-bold text-slate-700 dark:text-slate-200 transition-colors flex items-center gap-1.5">
                                <Icons.Undo className="w-3 h-3" /> {toast.action.label}
                            </button>
                        )}

                        <button onClick={() => removeToast(toast.id)} className="opacity-60 hover:opacity-100 ml-2 text-slate-400">
                            <Icons.X className="w-4 h-4" />
                        </button>
                    </div>
                ))}
            </div>
        );

        const ExpenseCalendar = ({ expenses, formatCurrency, onUpdateExpense, currency, showToast, adminPassword }) => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDateStr, setSelectedDateStr] = useState(getTodayLocal());
            const [receiptModal, setReceiptModal] = useState({ open: false, ex: null });
            const [receiptPassword, setReceiptPassword] = useState('');

            const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);

            const handlePrevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
            const handleNextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
            const handleToday = () => { setCurrentDate(new Date()); setSelectedDateStr(getTodayLocal()); };

            const handleDayClick = (day) => {
                const d = String(day).padStart(2, '0');
                const m = String(month + 1).padStart(2, '0');
                setSelectedDateStr(`${year}-${m}-${d}`);
            };

            const initiateToggleReceipt = (ex) => {
                setReceiptModal({ open: true, ex });
                setReceiptPassword('');
            };

            const confirmToggleReceipt = async () => {
                const pwd = receiptPassword;
                setReceiptPassword(''); // Limpa imediatamente para não ficar visível no estado
                if (pwd === adminPassword) {
                    const expenseId = receiptModal.ex.id;
                    const prevStatus = receiptModal.ex.received;
                    await onUpdateExpense(expenseId, { received: !prevStatus });
                    setReceiptModal({ open: false, ex: null });

                    if(showToast) {
                        showToast(
                            prevStatus ? "Recebimento cancelado." : "Recebimento confirmado!",
                            "success",
                            { label: "Desfazer", onClick: () => onUpdateExpense(expenseId, { received: prevStatus }) }
                        );
                    }
                } else {
                    if(showToast) showToast("Palavra-passe incorreta.", "error");
                }
            };

            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            const selectedExpenses = expenses.filter(e => e.date === selectedDateStr);

            return (
                <div className="space-y-6 fade-in relative">
                    {receiptModal.open && (
                        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-in fade-in">
                            <div className="material-panel dark:bg-slate-800 w-full max-w-xs p-8 text-center shadow-2xl">
                                <div className="mx-auto w-16 h-16 bg-blue-50 dark:bg-blue-900/30 rounded-full flex items-center justify-center mb-6 text-blue-600 dark:text-blue-400">
                                    <Icons.Check className="w-8 h-8" />
                                </div>
                                <h3 className="text-xl font-extrabold text-slate-900 dark:text-white mb-2">Confirmar Ação</h3>
                                <p className="text-sm text-slate-500 dark:text-slate-400 mb-6">Digite a palavra-passe do administrador.</p>
                                <input type="password" autoFocus placeholder="Palavra-passe" value={receiptPassword} onChange={e => setReceiptPassword(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && confirmToggleReceipt()}
                                    className="material-input w-full px-5 py-4 rounded-xl text-center font-bold text-slate-700 dark:text-white mb-8" />
                                <div className="flex gap-4">
                                    <button onClick={() => { setReceiptModal({open:false, ex:null}); setReceiptPassword(''); }} className="flex-1 py-3 material-btn text-slate-600 font-bold rounded-xl">Cancelar</button>
                                    <button onClick={confirmToggleReceipt} className="flex-1 py-3 material-btn-primary font-bold rounded-xl">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="material-panel p-5 md:p-6 flex flex-col relative transition-all duration-300">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-5">
                            <div className="flex items-center gap-4">
                                <h2 className="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">{monthNames[month]} <span className="text-slate-400 dark:text-slate-500 font-medium">{year}</span></h2>
                            </div>

                            <div className="flex items-center gap-2">
                                <button onClick={handlePrevMonth} className="material-btn p-1.5 rounded-lg text-slate-500 hover:text-blue-600 transition-all"><Icons.ChevronLeft className="w-5 h-5"/></button>
                                <button onClick={handleToday} className="material-btn px-4 py-1.5 text-xs font-bold text-slate-600 dark:text-slate-300 hover:text-blue-600 rounded-lg transition-all uppercase tracking-wider">Hoje</button>
                                <button onClick={handleNextMonth} className="material-btn p-1.5 rounded-lg text-slate-500 hover:text-blue-600 transition-all"><Icons.ChevronRight className="w-5 h-5"/></button>
                            </div>
                        </div>

                        <div>
                            <div className="grid grid-cols-7 mb-2 border-b border-slate-100 dark:border-slate-700 pb-2">
                                {["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"].map(d => (
                                    <div key={d} className="text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">{d}</div>
                                ))}
                            </div>
                            
                            <div className="grid grid-cols-7 gap-1.5 md:gap-2">
                                {Array.from({ length: firstDay }).map((_, i) => <div key={`empty-${i}`}></div>)}

                                {Array.from({ length: daysInMonth }).map((_, i) => {
                                    const day = i + 1;
                                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                    const isToday = dateStr === getTodayLocal();
                                    const isSelected = dateStr === selectedDateStr;
                                    
                                    const dayExpenses = expenses.filter(e => e.date === dateStr);
                                    const hasLate = dayExpenses.some(e => getPaymentStatus(e).isLate);
                                    const hasPending = dayExpenses.some(e => !e.received && !getPaymentStatus(e).isLate);
                                    const allReceived = dayExpenses.length > 0 && dayExpenses.every(e => e.received);

                                    return (
                                        <div key={day} onClick={() => handleDayClick(day)}
                                            className={`h-16 md:h-20 p-1 md:p-1.5 flex flex-col relative transition-all duration-200 rounded-lg md:rounded-xl cursor-pointer border
                                            ${isSelected ? 'bg-blue-50 dark:bg-blue-900/30 border-blue-200 dark:border-blue-700 shadow-sm' : 'bg-white dark:bg-slate-800 border-transparent hover:bg-slate-50 dark:hover:bg-slate-700 hover:border-slate-200 dark:hover:border-slate-600'}
                                            ${hasLate ? 'border-red-200 dark:border-red-800 bg-red-50/30 dark:bg-red-900/20' : ''}`}>
                                            <div className="flex justify-center items-start mt-1">
                                                <span className={`w-7 h-7 flex items-center justify-center rounded-full text-xs md:text-sm font-bold transition-all
                                                    ${isToday ? 'bg-blue-600 text-white' : isSelected ? 'text-blue-700 dark:text-blue-400' : 'text-slate-600 dark:text-slate-300'}
                                                    ${hasLate && !isToday && !isSelected ? 'text-red-600 dark:text-red-400' : ''}`}>
                                                    {day}
                                                </span>
                                            </div>

                                            <div className="mt-auto flex justify-center gap-1 mb-1">
                                                {hasLate && <div className="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-red-500 shadow-sm animate-pulse" title="Pagamentos Atrasados!"></div>}
                                                {hasPending && <div className="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-orange-400 shadow-sm" title="Recebimentos Pendentes"></div>}
                                                {allReceived && <div className="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-emerald-500 shadow-sm" title="Tudo Recebido"></div>}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    <div className="material-panel p-6 md:p-8">
                        <h3 className="text-lg font-extrabold text-slate-900 dark:text-white mb-5 flex items-center gap-3">
                            <div className="p-2 bg-blue-50 dark:bg-blue-900/30 rounded-lg text-blue-600 dark:text-blue-400"><Icons.Calendar className="w-5 h-5"/></div>
                            Lançamentos do dia {formatDateBR(selectedDateStr)}
                        </h3>
                        
                        {selectedExpenses.length === 0 ? (
                            <div className="text-center py-10 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-dashed border-slate-200 dark:border-slate-700">
                                <p className="text-slate-400 font-medium">Nenhum lançamento nesta data.</p>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {selectedExpenses.map(ex => {
                                    const status = getPaymentStatus(ex);
                                    const expectedDate = getExpectedDate(ex);
                                    
                                    return (
                                        <div key={ex.id} className={`bg-white dark:bg-slate-800 border shadow-sm p-5 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4 hover:shadow-md transition-shadow ${status.isLate ? 'border-red-300 dark:border-red-700 bg-red-50/10 dark:bg-red-900/10' : 'border-slate-200 dark:border-slate-700'}`}>
                                            <div className="flex-1">
                                                <div className="flex items-center gap-3 mb-2 flex-wrap">
                                                    <span className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                                        {getStoreLogo(ex.store, "w-6 h-6")} {ex.store}
                                                    </span>
                                                    <span className={`text-[10px] px-2.5 py-1 rounded-full font-bold border ${status.color}`}>
                                                        {status.label}
                                                    </span>
                                                    {ex.category && (
                                                        <span className="text-[10px] px-2.5 py-1 rounded-full font-bold border bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 border-blue-200 dark:border-blue-700 flex items-center gap-1">
                                                            <Icons.Tag className="w-3 h-3" /> {ex.category}
                                                        </span>
                                                    )}
                                                </div>
                                                <div className="flex flex-col">
                                                    <p className="font-extrabold text-slate-900 dark:text-white text-2xl tracking-tight">{currency} {formatCurrency(ex.amount)}</p>
                                                    {(isPayjoy(ex) || isCrefaz(ex)) && !ex.received && (
                                                        <span className={`text-sm mt-1 flex items-center gap-1 font-semibold ${status.isLate ? 'text-red-500 dark:text-red-400' : 'text-slate-500 dark:text-slate-400'}`}>
                                                            <Icons.Clock className="w-4 h-4" /> Previsão: {formatDateBR(expectedDate)}
                                                        </span>
                                                    )}
                                                </div>
                                                {ex.notes && <p className="text-sm text-slate-500 mt-2 italic border-l-2 border-slate-200 dark:border-slate-700 pl-2">{ex.notes}</p>}
                                            </div>
                                            
                                            <button onClick={() => initiateToggleReceipt(ex)} className={`px-5 py-3 rounded-xl font-bold flex items-center gap-2 transition-all text-sm border ${
                                                    ex.received ? 'bg-emerald-50 dark:bg-emerald-900/30 border-emerald-200 dark:border-emerald-800 text-emerald-600 dark:text-emerald-400 hover:bg-emerald-100 dark:hover:bg-emerald-900/50' 
                                                                : status.isLate ? 'bg-red-500 text-white border-red-600 hover:bg-red-600 shadow-md animate-pulse'
                                                                                : 'bg-white dark:bg-slate-700 border-slate-200 dark:border-slate-600 text-orange-500 dark:text-orange-400 hover:bg-orange-50 dark:hover:bg-orange-900/30'
                                                }`}>
                                                {ex.received ? <Icons.Check className="w-4 h-4" /> : <Icons.AlertCircle className="w-4 h-4" />}
                                                {ex.received ? 'Confirmado' : 'Confirmar'}
                                            </button>
                                        </div>
                                    )
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const PaymentsReport = ({ expenses, currency, formatCurrency, onUpdateExpense, showToast, adminPassword }) => {
            const [filter, setFilter] = useState('all');
            const [receiptModal, setReceiptModal] = useState({ open: false, ex: null });
            const [receiptPassword, setReceiptPassword] = useState('');
            const [sortField, setSortField] = useState(null);
            const [sortDir, setSortDir] = useState('asc');

            const handleSort = (field) => {
                if (sortField === field) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
                else { setSortField(field); setSortDir('asc'); }
            };

            const initiateToggleReceipt = (ex) => { setReceiptModal({ open: true, ex }); setReceiptPassword(''); };

            const confirmToggleReceipt = async () => {
                const pwd = receiptPassword;
                setReceiptPassword(''); // Limpa imediatamente para não ficar visível no estado
                if (pwd === adminPassword) {
                    const expenseId = receiptModal.ex.id;
                    const prevStatus = receiptModal.ex.received;
                    await onUpdateExpense(expenseId, { received: !prevStatus });
                    setReceiptModal({ open: false, ex: null });

                    if(showToast) {
                        showToast(
                            prevStatus ? "Recebimento cancelado." : "Recebimento confirmado!",
                            "success",
                            { label: "Desfazer", onClick: () => onUpdateExpense(expenseId, { received: prevStatus }) }
                        );
                    }
                } else {
                    if(showToast) showToast("Palavra-passe incorreta.", "error");
                }
            };

            const filteredExpenses = useMemo(() => {
                let result = [...expenses];
                if (filter !== 'all') {
                    result = result.filter(ex => {
                        const status = getPaymentStatus(ex);
                        if (filter === 'late') return status.isLate && !ex.received;
                        if (filter === 'pending') return !status.isLate && !ex.received;
                        if (filter === 'received') return ex.received;
                        return true;
                    });
                }
                result.sort((a, b) => {
                    let cmp = 0;
                    if (sortField === 'store') {
                        cmp = (a.store || '').localeCompare(b.store || '', 'pt-BR');
                    } else if (sortField === 'date') {
                        cmp = (a.date || '').localeCompare(b.date || '');
                    } else {
                        cmp = getExpectedDate(a).localeCompare(getExpectedDate(b));
                    }
                    return sortDir === 'asc' ? cmp : -cmp;
                });
                return result;
            }, [expenses, filter, sortField, sortDir]);

            const totals = useMemo(() => {
                let late = 0, pending = 0, received = 0;
                expenses.forEach(ex => {
                    const status = getPaymentStatus(ex);
                    if (ex.received) received += ex.amount;
                    else if (status.isLate) late += ex.amount;
                    else pending += ex.amount;
                });
                return { late, pending, received };
            }, [expenses]);

            return (
                <div className="space-y-6 fade-in relative">
                    {receiptModal.open && (
                        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-in fade-in">
                            <div className="material-panel dark:bg-slate-800 w-full max-w-xs p-8 text-center shadow-2xl">
                                <div className="mx-auto w-16 h-16 bg-blue-50 dark:bg-blue-900/30 rounded-full flex items-center justify-center mb-6 text-blue-600 dark:text-blue-400"><Icons.Check className="w-8 h-8" /></div>
                                <h3 className="text-xl font-extrabold text-slate-900 dark:text-white mb-2">Confirmar Ação</h3>
                                <p className="text-sm text-slate-500 mb-6">Digite a palavra-passe do administrador.</p>
                                <input type="password" autoFocus placeholder="Palavra-passe" value={receiptPassword} onChange={e => setReceiptPassword(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && confirmToggleReceipt()}
                                    className="material-input w-full px-5 py-4 rounded-xl text-center font-bold text-slate-700 dark:text-white mb-8" />
                                <div className="flex gap-4">
                                    <button onClick={() => { setReceiptModal({open:false, ex:null}); setReceiptPassword(''); }} className="flex-1 py-3 material-btn text-slate-600 font-bold rounded-xl">Cancelar</button>
                                    <button onClick={confirmToggleReceipt} className="flex-1 py-3 material-btn-primary font-bold rounded-xl">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="material-panel p-6 border-l-4 border-l-red-500 relative overflow-hidden bg-white cursor-pointer hover:shadow-md" onClick={() => setFilter('late')}>
                            <div className="absolute top-0 right-0 p-4 opacity-5 text-red-600 transform translate-x-2 -translate-y-2"><Icons.AlertTriangle className="w-24 h-24" /></div>
                            <p className="text-xs text-slate-500 font-bold uppercase tracking-widest mb-2">Atrasados</p>
                            <h3 className="text-3xl font-extrabold text-red-600 dark:text-red-500">{currency} {formatCurrency(totals.late)}</h3>
                        </div>
                        <div className="material-panel p-6 border-l-4 border-l-orange-400 relative overflow-hidden bg-white cursor-pointer hover:shadow-md" onClick={() => setFilter('pending')}>
                            <div className="absolute top-0 right-0 p-4 opacity-5 text-orange-600 transform translate-x-2 -translate-y-2"><Icons.Clock className="w-24 h-24" /></div>
                            <p className="text-xs text-slate-500 font-bold uppercase tracking-widest mb-2">Pendentes</p>
                            <h3 className="text-3xl font-extrabold text-orange-500 dark:text-orange-400">{currency} {formatCurrency(totals.pending)}</h3>
                        </div>
                        <div className="material-panel p-6 border-l-4 border-l-emerald-500 relative overflow-hidden bg-white cursor-pointer hover:shadow-md" onClick={() => setFilter('received')}>
                            <div className="absolute top-0 right-0 p-4 opacity-5 text-emerald-600 transform translate-x-2 -translate-y-2"><Icons.Check className="w-24 h-24" /></div>
                            <p className="text-xs text-slate-500 font-bold uppercase tracking-widest mb-2">Recebidos</p>
                            <h3 className="text-3xl font-extrabold text-emerald-600 dark:text-emerald-500">{currency} {formatCurrency(totals.received)}</h3>
                        </div>
                    </div>

                    <div className="material-panel p-8">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-6 mb-8 border-b border-slate-100 dark:border-slate-700 pb-6">
                            <h3 className="text-xl font-extrabold text-slate-900 dark:text-white flex items-center gap-3">
                                <div className="p-2 bg-blue-50 dark:bg-blue-900/30 rounded-lg text-blue-600 dark:text-blue-400"><Icons.FileSpreadsheet className="w-5 h-5"/></div>
                                Controle de Pagamentos
                            </h3>
                            
                            <div className="flex gap-2 bg-slate-100 dark:bg-slate-800/50 p-1.5 rounded-xl border border-slate-200 dark:border-slate-700 overflow-x-auto w-full md:w-auto">
                                <button onClick={() => setFilter('all')} className={`px-4 py-2 text-xs font-bold rounded-lg transition-all whitespace-nowrap ${filter === 'all' ? 'bg-white dark:bg-slate-700 text-slate-900 dark:text-white shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Todos</button>
                                <button onClick={() => setFilter('late')} className={`px-4 py-2 text-xs font-bold rounded-lg transition-all flex items-center gap-1 whitespace-nowrap ${filter === 'late' ? 'bg-red-500 text-white shadow-sm' : 'text-slate-500 hover:text-red-500'}`}><Icons.AlertTriangle className="w-3 h-3" /> Atrasados</button>
                                <button onClick={() => setFilter('pending')} className={`px-4 py-2 text-xs font-bold rounded-lg transition-all whitespace-nowrap ${filter === 'pending' ? 'bg-orange-400 text-white shadow-sm' : 'text-slate-500 hover:text-orange-500'}`}>Pendentes</button>
                                <button onClick={() => setFilter('received')} className={`px-4 py-2 text-xs font-bold rounded-lg transition-all flex items-center gap-1 whitespace-nowrap ${filter === 'received' ? 'bg-emerald-500 text-white shadow-sm' : 'text-slate-500 hover:text-emerald-500'}`}><Icons.Check className="w-3 h-3" /> Recebidos</button>
                            </div>
                        </div>

                        {filteredExpenses.length === 0 ? (
                            <div className="text-center py-12 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-dashed border-slate-200 dark:border-slate-700">
                                <Icons.Check className="w-12 h-12 text-slate-300 dark:text-slate-600 mx-auto mb-3" />
                                <p className="text-slate-500 font-medium">Nenhum lançamento encontrado para este filtro.</p>
                            </div>
                        ) : (
                            <div className="overflow-x-auto rounded-xl border border-slate-200 dark:border-slate-700">
                                <table className="w-full text-left text-sm relative border-collapse">

                                                    <div className="w-full max-w-[40px] progress-track transition-all duration-700 h-full flex flex-col justify-end"><div className={`w-full transition-all duration-700 ${val > 0 ? 'bg-blue-500 hover:bg-blue-600' : 'bg-transparent h-0'}`} style={{ height: val > 0 ? getBarHeight(val, maxVal) : '0%' }}></div></div>

                            )}

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div className="material-panel p-8">
                                    <h3 className="font-bold text-slate-900 dark:text-white mb-8 flex items-center gap-3 text-lg"><div className="p-2 bg-blue-50 dark:bg-blue-900/30 rounded-lg text-blue-600 dark:text-blue-400"><Icons.Store className="w-5 h-5"/></div>Ranking de Lojas ({viewMode === 'month' ? 'Mês' : 'Ano'})</h3>
                                    <div className="space-y-6">
                                        {sortedStores.map(([store, value], idx) => (

        };

        const App = () => {
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [expenses, setExpenses] = useState([]);
            const [settings, setSettings] = useState(DEFAULT_SETTINGS);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [toasts, setToasts] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [groupBy, setGroupBy] = useState('date');
            
            const [filterMode, setFilterMode] = useState('day'); 
            const [selectedDate, setSelectedDate] = useState('');
            const [selectedMonth, setSelectedMonth] = useState('');

            const [currentView, setCurrentView] = useState('dashboard');
            const [syncStatus, setSyncStatus] = useState('offline');
            const [user, setUser] = useState(null);
            
            const fileInputRef = useRef(null);
            const amountInputRef = useRef(null);
            const toastTimeoutsRef = useRef([]);
            
            const [editingId, setEditingId] = useState(null);
            const [date, setDate] = useState(getTodayLocal());
            const [store, setStore] = useState('');
            const [category, setCategory] = useState('');
            const [amount, setAmount] = useState('');
            const [notes, setNotes] = useState('');

            const [isSaving, setIsSaving] = useState(false);
            const [showBackupOptions, setShowBackupOptions] = useState(false);
            const [editModal, setEditModal] = useState({ open: false, ex: null });
            const [editPassword, setEditPassword] = useState('');
            
            // UX Melhoria 4: Modo Escuro (Dark Mode) Initialization
            useEffect(() => {
                const savedTheme = localStorage.getItem('miplace_theme');
                if (savedTheme === 'dark') setIsDarkMode(true);
                else if (!savedTheme && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) setIsDarkMode(true);
            }, []);

            useEffect(() => {
                if (isDarkMode) { document.documentElement.classList.add('dark'); localStorage.setItem('miplace_theme', 'dark'); }
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('miplace_theme', 'light'); }
            }, [isDarkMode]);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await auth.signInWithCustomToken(__initial_auth_token);
                        else await auth.signInAnonymously();
                    } catch (error) { setSyncStatus('error'); showToast("Erro ao conectar.", "error"); }
                };
                auth.onAuthStateChanged(u => { if(u) setUser(u); });
                initAuth();

                const savedSet = localStorage.getItem('odoo_fast_settings');
                if (savedSet) {
                    const parsed = JSON.parse(savedSet);
                    parsed.categories = CATEGORIES_LIST.map(cat => ({ label: cat, odooRef: cat }));
                    if (!parsed.receiptPassword) parsed.receiptPassword = DEFAULT_SETTINGS.receiptPassword;
                    if (!parsed.editPassword) parsed.editPassword = DEFAULT_SETTINGS.editPassword;
                    setSettings(parsed);
                }
            }, []);

            const getRefs = () => {
                let expensesRef;
                if (typeof __app_id !== 'undefined') {
                    const base = db.collection('artifacts').doc(envAppId).collection('public').doc('data');
                    expensesRef = base.collection('expenses'); 
                } else {
                    expensesRef = db.collection('recebimentos-payjoy-crefaz').doc('data').collection('team_expenses_v2'); 
                }
                return { expensesRef };
            };

            useEffect(() => {
                if (!user) return;
                setSyncStatus('syncing');
                const { expensesRef } = getRefs();
                const unsubscribe = expensesRef.orderBy('date', 'desc').onSnapshot(snapshot => {
                    const loadedExpenses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setExpenses(loadedExpenses);
                    setSyncStatus('synced');
                }, err => { setSyncStatus('error'); });
                return () => unsubscribe();
            }, [user]);

            const handleDBAdd = async (newExpense) => {
                try {
                    const { expensesRef } = getRefs();
                    await expensesRef.add(newExpense); 
                    setSyncStatus('synced');
                } catch (e) { showToast("Erro ao salvar online", "error"); }
            };

            const handleDBUpdate = async (id, updatedData) => {
                try {
                    const { expensesRef } = getRefs();
                    await expensesRef.doc(id).update(updatedData);
                    setSyncStatus('synced');
                } catch (e) { console.error("Erro update:", e); }
            };

            const showToast = (message, type = 'success', action = null) => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type, action }]);
                const tid = setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 5000);
                toastTimeoutsRef.current.push(tid);
            };

            // Limpa todos os timeouts pendentes de toasts quando o componente desmonta
            useEffect(() => {
                return () => toastTimeoutsRef.current.forEach(clearTimeout);
            }, []);

            // UX Melhoria 2: Copiar Resumo para WhatsApp
            const handleCopySummary = () => {
                const dateStr = filterMode === 'day' && selectedDate ? formatDateBR(selectedDate) : formatDateBR(getTodayLocal());
                
                let late = 0, pending = 0, received = 0;
                filteredExpenses.forEach(ex => {
                    const status = getPaymentStatus(ex);
                    if (ex.received) received += ex.amount;
                    else if (status.isLate) late += ex.amount;
                    else pending += ex.amount;
                });

                const text = `📊 *Fecho Miplace - ${dateStr}*\n\n💰 Total Lançado: ${settings.currency} ${formatCurrency(totalGeneral)}\n✅ Confirmados: ${settings.currency} ${formatCurrency(received)}\n⏳ Pendentes: ${settings.currency} ${formatCurrency(pending)}\n⚠️ Atrasados: ${settings.currency} ${formatCurrency(late)}\n\n_Enviado via Sistema de Gestão_`;
                
                const fallbackCopy = (t) => {
                    const el = document.createElement('textarea');
                    el.value = t;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                };

                if(navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(()=>showToast("Resumo copiado para WhatsApp!", "success")).catch(()=> { fallbackCopy(text); showToast("Resumo copiado!", "success");});
                } else { 
                    fallbackCopy(text); showToast("Resumo copiado!", "success"); 
                }
            };

            // UX Melhoria 5: Atalhos de Preenchimento
            const applyShortcut = (cat, st) => {
                setCategory(cat);
                setStore(st);
                if (amountInputRef.current) amountInputRef.current.focus();
            };

            // Re-adding missing functions 
            const handleBackupClick = () => setShowBackupOptions(true);
            
            const saveToCloud = () => {
                showToast("Dados já estão na nuvem!", "info");
                setShowBackupOptions(false);
            };

            const handleEmptyStateRestore = () => {
                if(fileInputRef.current) {
                    fileInputRef.current.click();
                }
            };

            const saveToComputer = async () => {
                const backupData = { data: expenses, version: 3 };
                const dataStr = JSON.stringify(backupData, null, 2);
                const fileName = `backup_completo_${formatDateBR(getTodayLocal()).replace(/\//g, '-')}.json`;

                if (window.showSaveFilePicker) {
                    try {
                        const handle = await window.showSaveFilePicker({ suggestedName: fileName, types: [{ description: 'Arquivo de Backup JSON', accept: { 'application/json': ['.json'] } }] });
                        const writable = await handle.createWritable();
                        await writable.write(dataStr);
                        await writable.close();
                        showToast("Backup salvo no computador!", "success");
                        setShowBackupOptions(false);
                        return;
                    } catch (err) { if (err.name === 'AbortError') return; }
                }

                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a'); link.href = url; link.download = fileName;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                showToast("Backup baixado para Downloads!", "success");
                setShowBackupOptions(false);
            };

            const triggerRestore = () => { fileInputRef.current.click(); };
            const handleRestoreFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // Limite de 5MB para evitar travamento do navegador
                if (file.size > 5 * 1024 * 1024) {
                    showToast("Arquivo muito grande (máx 5MB).", "error");
                    e.target.value = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);

                        // Valida estrutura do arquivo antes de qualquer operação
                        if (!importedData || !importedData.data || !Array.isArray(importedData.data)) {
                            return showToast("Arquivo de backup inválido. Selecione um JSON gerado por este sistema.", "error");
                        }

                        // Filtra apenas itens com campos obrigatórios
                        const validItems = importedData.data.filter(item =>
                            item && item.date && item.store && item.category && typeof item.amount === 'number'
                        );

                        if (validItems.length === 0) {
                            return showToast("Nenhum registro válido encontrado no backup.", "error");
                        }

                        const skipped = importedData.data.length - validItems.length;
                        const msg = `ATENÇÃO: Enviar ${validItems.length} registros para a nuvem?${skipped > 0 ? `\n\n(${skipped} itens inválidos serão ignorados.)` : ''}`;

                        if (confirm(msg)) {
                            const { expensesRef } = getRefs();
                            let batch = db.batch(); let count = 0;
                            for(const item of validItems) {
                                const ref = expensesRef.doc();
                                batch.set(ref, { ...item, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                                count++;
                                if(count % 400 === 0) { await batch.commit(); batch = db.batch(); }
                            }
                            await batch.commit();
                            showToast(`${count} registros enviados!`, "success");
                        }
                    } catch (err) { showToast("Erro ao ler arquivo. Verifique se é um JSON válido.", "error"); }
                };
                reader.readAsText(file); e.target.value = '';
            };

            const handleAmountChange = (e) => {
                let val = e.target.value.replace(/\D/g, '');
                if (!val) { setAmount(''); return; }
                setAmount(new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(parseFloat(val) / 100));
            };

            const resetForm = () => { setAmount(''); setNotes(''); setEditingId(null); };
            const cancelEdit = () => { resetForm(); showToast("Cancelado", "info"); };

            const startEdit = (ex) => {
                setEditingId(ex.id); setDate(ex.date); setStore(ex.store);
                setCategory(ex.category); setAmount(formatCurrency(ex.amount)); setNotes(ex.notes || '');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                showToast("Editando...", "info");
                if (currentView !== 'dashboard') setCurrentView('dashboard');
            };

            const initiateEdit = (ex) => { setEditModal({ open: true, ex }); setEditPassword(''); };
            const confirmEdit = () => {
                const pwd = editPassword;
                setEditPassword(''); // Limpa imediatamente para não ficar visível no estado
                if (pwd === settings.editPassword) {
                    startEdit(editModal.ex);
                    setEditModal({ open: false, ex: null });
                } else {
                    showToast("Palavra-passe incorreta.", "error");
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (isSaving) return;
                if (settings.employeeName === "Seu Nome" || !settings.employeeName.trim()) {
                    showToast("Configure seu nome antes de lançar.", "error"); setIsSettingsOpen(true); return;
                }
                if (!store) return showToast("Selecione uma loja.", "error");
                if (!category) return showToast("Selecione uma categoria.", "error");

                const totalVal = parseFloat(amount.replace(/\./g, '').replace(',', '.'));
                if (isNaN(totalVal) || totalVal <= 0) return showToast("Valor inválido", "error");

                const today = getTodayLocal();
                if (date > today) return showToast("A data não pode ser futura.", "error");

                // Detecção de duplicatas (apenas em novos lançamentos)
                if (!editingId) {
                    const isDuplicate = expenses.some(ex =>
                        ex.date === date &&
                        ex.store === store &&
                        ex.category === category &&
                        Math.abs(ex.amount - totalVal) < 0.01
                    );
                    if (isDuplicate) return showToast("Já existe um lançamento idêntico nesta data.", "error");
                }

                try {
                    setIsSaving(true);
                    if (editingId) {
                        const updatedData = { date, description: category, store, category, amount: totalVal, notes, employeeName: settings.employeeName, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                        await handleDBUpdate(editingId, updatedData);
                        showToast("Lançamento atualizado!");
                        resetForm();
                    } else {
                        const newDoc = { date, description: category, category, notes, store: store, amount: totalVal, quantity: 1.0, employeeName: settings.employeeName, received: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() };
                        await handleDBAdd(newDoc);
                        showToast("Despesa salva!");
                        resetForm();
                    }
                } finally {
                    setIsSaving(false);
                }
            };

            const exportToCSV = () => {
                if (expenses.length === 0) return showToast("Nada para exportar", "error");
                const headers = ["date", "expected_date", "name", "store_name", "product_id", "unit_amount", "quantity", "description", "employee_id", "status"];
                const rows = expenses.map(ex => {
                    const status = getPaymentStatus(ex).label;
                    const expected = getExpectedDate(ex);
                    return [ formatDateBR(ex.date), formatDateBR(expected), ex.category || ex.description, ex.store, ex.category, formatCurrency(ex.amount), ex.quantity, ex.notes, ex.employeeName || settings.employeeName, status ];
                });
                const csvContent = "\uFEFF" + [headers.join(';'), ...rows.map(r => r.map(f => `"${String(f).replace(/"/g, '""')}"`).join(';'))].join('\n');
                const url = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
                const link = document.createElement('a'); link.href = url; link.download = `lancamentos_odoo_${formatDateBR(getTodayLocal()).replace(/\//g, '-')}.csv`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                showToast("Arquivo CSV gerado!");
            };

            const availableDates = useMemo(() => { const dates = [...new Set(expenses.map(e => e.date))]; return dates.sort((a, b) => a.localeCompare(b)); }, [expenses]);
            const availableMonths = useMemo(() => { const months = [...new Set(expenses.map(e => e.date.substring(0, 7)))]; return months.sort((a, b) => a.localeCompare(b)); }, [expenses]);

            useEffect(() => { if (availableDates.length > 0 && (!selectedDate || !availableDates.includes(selectedDate))) setSelectedDate(availableDates[availableDates.length - 1]); }, [availableDates, selectedDate]);
            useEffect(() => { if (availableMonths.length > 0 && (!selectedMonth || !availableMonths.includes(selectedMonth))) setSelectedMonth(availableMonths[availableMonths.length - 1]); }, [availableMonths, selectedMonth]);

            const handlePrevDate = () => { const idx = availableDates.indexOf(selectedDate); if (idx > 0) setSelectedDate(availableDates[idx - 1]); };
            const handleNextDate = () => { const idx = availableDates.indexOf(selectedDate); if (idx < availableDates.length - 1) setSelectedDate(availableDates[idx + 1]); };
            const handlePrevMonthFilter = () => { const idx = availableMonths.indexOf(selectedMonth); if (idx > 0) setSelectedMonth(availableMonths[idx - 1]); };
            const handleNextMonthFilter = () => { const idx = availableMonths.indexOf(selectedMonth); if (idx < availableMonths.length - 1) setSelectedMonth(availableMonths[idx + 1]); };

            const filteredExpenses = useMemo(() => {
                let filtered = expenses;
                if (searchTerm) {
                    const lowerSearch = searchTerm.toLowerCase();
                    return filtered.filter(ex => (ex.description && ex.description.toLowerCase().includes(lowerSearch)) || ex.category.toLowerCase().includes(lowerSearch) || ex.store.toLowerCase().includes(lowerSearch) || (ex.notes && ex.notes.toLowerCase().includes(lowerSearch)));
                }
                if (filterMode === 'month' && selectedMonth) filtered = filtered.filter(ex => ex.date.startsWith(selectedMonth));
                else if (filterMode === 'day' && selectedDate) filtered = filtered.filter(ex => ex.date === selectedDate);
                else if (filterMode === 'late') filtered = filtered.filter(ex => getPaymentStatus(ex).isLate);
                return filtered;
            }, [expenses, searchTerm, selectedDate, selectedMonth, filterMode]);

            const groupedExpenses = useMemo(() => {
                const groups = {};
                filteredExpenses.forEach(ex => { const key = groupBy === 'date' ? ex.date : ex.store; if (!groups[key]) groups[key] = []; groups[key].push(ex); });
                const sortedKeys = Object.keys(groups).sort((a, b) => { if (groupBy === 'date') return b.localeCompare(a); return a.localeCompare(b); });
                return sortedKeys.map(key => ({ key, items: groups[key], total: groups[key].reduce((sum, item) => sum + item.amount, 0) }));
            }, [filteredExpenses, groupBy]);

            const totalsByStore = useMemo(() => { const acc = {}; filteredExpenses.forEach(ex => { acc[ex.store] = (acc[ex.store] || 0) + ex.amount; }); return acc; }, [filteredExpenses]);
            const totalGeneral = filteredExpenses.reduce((sum, ex) => sum + ex.amount, 0);

            const getTotalTitle = () => {
                if (searchTerm) return "(Busca)";
                if (filterMode === 'month') return `(Mês: ${formatMonthBR(selectedMonth)})`;
                if (filterMode === 'late') return `(Valores em Atraso)`;
                return "(Do Dia)";
            }

            return (
                <div className="pb-28 md:pb-10 print:pb-0 min-h-screen bg-slate-50 dark:bg-slate-900 transition-colors">
                    <ToastContainer toasts={toasts} removeToast={id => setToasts(p => p.filter(t => t.id !== id))} />

                    {editModal.open && (
                        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-in fade-in">
                            <div className="material-panel dark:bg-slate-800 w-full max-w-xs p-8 text-center shadow-2xl">
                                <div className="mx-auto w-16 h-16 bg-orange-50 dark:bg-orange-900/30 rounded-full flex items-center justify-center mb-6 text-orange-500 dark:text-orange-400">
                                    <Icons.Edit className="w-8 h-8" />
                                </div>
                                <h3 className="text-xl font-extrabold text-slate-900 dark:text-white mb-2">Autorizar Edição</h3>
                                <p className="text-sm text-slate-500 mb-6">Digite a palavra-passe para editar este lançamento.</p>
                                <input type="password" autoFocus placeholder="Palavra-passe" value={editPassword} onChange={e => setEditPassword(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && confirmEdit()}
                                    className="material-input w-full px-5 py-4 rounded-xl text-center font-bold text-slate-700 dark:text-white mb-8" />
                                <div className="flex gap-4">
                                    <button onClick={() => { setEditModal({open:false, ex:null}); setEditPassword(''); }} className="flex-1 py-3 material-btn text-slate-600 font-bold rounded-xl">Cancelar</button>
                                    <button onClick={confirmEdit} className="flex-1 py-3 material-btn-primary font-bold rounded-xl">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="sticky top-0 z-50 no-print px-4 py-4 md:py-6 bg-slate-50/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-4 md:gap-6">
                                    <div className="bg-blue-600 p-2 md:p-3 rounded-xl text-white shadow-md">
                                        <Icons.Wallet className="w-6 h-6 md:w-7 md:h-7" />
                                    </div>
                                    <div className="flex flex-col justify-center">
                                        <div className="flex items-center gap-4">
                                            <h1 className="font-extrabold text-slate-900 dark:text-white text-lg md:text-xl tracking-tight">
                                                Miplace Pay
                                            </h1>
                                            {/* Navegação Topo (Apenas Desktop) */}
                                            <div className="hidden md:flex items-center gap-2 ml-4 border-l border-slate-200 dark:border-slate-700 pl-4">
                                                <button onClick={() => setCurrentView('dashboard')} className={`px-4 py-2 rounded-lg transition-all flex items-center gap-2 font-bold text-sm ${currentView === 'dashboard' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                                                    <Icons.Home className="w-4 h-4" /> Home
                                                </button>
                                                <button onClick={() => setCurrentView('calendar')} className={`px-4 py-2 rounded-lg transition-all flex items-center gap-2 font-bold text-sm ${currentView === 'calendar' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                                                    <Icons.Calendar className="w-4 h-4" /> Calendário
                                                </button>
                                                <button onClick={() => setCurrentView('analytics')} className={`px-4 py-2 rounded-lg transition-all flex items-center gap-2 font-bold text-sm ${currentView === 'analytics' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                                                    <Icons.Chart className="w-4 h-4" /> Análise
                                                </button>
                                                <button onClick={() => setCurrentView('payments_report')} className={`px-4 py-2 rounded-lg transition-all flex items-center gap-2 font-bold text-sm ${currentView === 'payments_report' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                                                    <Icons.FileSpreadsheet className="w-4 h-4" /> Relatório
                                                </button>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3 mt-1">
                                            {settings.employeeName !== "Seu Nome" ? (
                                                <div className="flex items-center gap-2">
                                                    <span className="text-[10px] md:text-[11px] bg-slate-100 dark:bg-slate-800 px-2 md:px-3 py-1 rounded-full font-bold text-slate-600 dark:text-slate-300 flex items-center gap-2 border border-slate-200 dark:border-slate-700">
                                                        <Icons.User className="w-3 h-3"/> {settings.employeeName}
                                                    </span>
                                                    {syncStatus === 'synced' && <div className="w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.6)]" title="Online"></div>}
                                                    {syncStatus === 'syncing' && <div className="w-2 h-2 rounded-full bg-yellow-400 animate-pulse" title="Sincronizando..."></div>}
                                                    {syncStatus === 'error' && <Icons.WifiOff className="w-3 h-3 text-red-500" title="Erro de Conexão" />}
                                                </div>
                                            ) : (
                                                <span className="text-[10px] md:text-[11px] bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-800 px-3 py-1 rounded-full font-bold animate-pulse">Offline (Configurar)</span>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2 md:gap-3">
                                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="material-btn p-2 md:p-3 rounded-xl text-slate-500 hover:text-blue-600" title="Alternar Tema">
                                        {isDarkMode ? <Icons.Sun className="w-5 h-5 text-yellow-500" /> : <Icons.Moon className="w-5 h-5 text-slate-600" />}
                                    </button>
                                    <button onClick={handleBackupClick} className="material-btn hidden md:block p-2 md:p-3 rounded-xl text-slate-500 hover:text-blue-600" title="Salvar Backup">
                                        <Icons.HardDrive className="w-5 h-5" />
                                    </button>
                                    <button onClick={() => setIsSettingsOpen(true)} className="material-btn p-2 md:p-3 rounded-xl text-slate-500 hover:text-blue-600" title="Configurações">
                                        <Icons.Settings className="w-5 h-5" />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto px-4 md:px-6 space-y-6 md:space-y-8 mt-6 md:mt-8">
                        
                        {currentView === 'calendar' ? (
                            <ExpenseCalendar expenses={expenses} formatCurrency={formatCurrency} onUpdateExpense={handleDBUpdate} currency={settings.currency} showToast={showToast} adminPassword={settings.receiptPassword} />
                        ) : currentView === 'analytics' ? (
                            <AnalyticsDashboard expenses={expenses} currency={settings.currency} formatCurrency={formatCurrency} />
                        ) : currentView === 'payments_report' ? (
                            <PaymentsReport expenses={expenses} currency={settings.currency} formatCurrency={formatCurrency} onUpdateExpense={handleDBUpdate} showToast={showToast} adminPassword={settings.receiptPassword} />
                        ) : (
                            <>
                                {expenses.length > 0 && (
                                    <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-4 no-print fade-in">
                                            {Object.entries(totalsByStore).sort((a, b) => b[1] - a[1]).map(([storeName, val]) => (
                                                <div key={storeName} className="material-panel p-4 md:p-5 flex flex-col justify-between hover:-translate-y-1 transition-transform">
                                                    <div className="flex items-center gap-2 md:gap-3 mb-3 md:mb-4">
                                                        {getStoreLogo(storeName, "w-6 h-6 md:w-8 md:h-8")}
                                                        <span className="text-[9px] md:text-[10px] uppercase font-bold text-slate-500 dark:text-slate-400 truncate block tracking-widest">{storeName}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-lg md:text-xl font-extrabold text-slate-900 dark:text-white block mb-2 tracking-tight">{settings.currency} {formatCurrency(val)}</span>
                                                        <div className="w-full progress-track h-1.5"><div className="h-full progress-fill" style={{width: '70%'}}></div></div>
                                                    </div>
                                                </div>
                                            ))}
                                    </div>
                                )}

                                <div className="material-panel p-6 md:p-10 no-print">
                                    <div className="flex justify-between items-center mb-6 md:mb-8 border-b border-slate-100 dark:border-slate-800 pb-4 md:pb-6">
                                        <h2 className="text-xl md:text-2xl font-extrabold text-slate-900 dark:text-white flex items-center gap-3 tracking-tight">
                                            <div className="p-2 md:p-3 bg-blue-50 dark:bg-blue-900/30 rounded-xl text-blue-600 dark:text-blue-400">
                                                {editingId ? <Icons.Edit className="w-5 h-5 md:w-6 md:h-6"/> : <Icons.Plus className="w-5 h-5 md:w-6 md:h-6" />}
                                            </div>
                                            {editingId ? "Editar Lançamento" : "Novo Lançamento"}
                                        </h2>
                                        {editingId && (
                                            <button onClick={cancelEdit} className="material-btn px-4 md:px-5 py-2 rounded-lg text-sm font-bold text-slate-600 hover:text-red-600">
                                                Cancelar Edição
                                            </button>
                                        )}
                                    </div>

                                    {/* UX Melhoria 5: Botões de Preenchimento Rápido Dinâmicos (3 Linhas sem Scroll) */}
                                    {!editingId && (
                                        <div className="mb-6">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Preenchimento Rápido</p>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-2">
                                                {CATEGORIES_LIST.flatMap(cat => 
                                                    STORES_LIST.map(st => (
                                                        <button 
                                                            key={`${cat}-${st}`}
                                                            type="button" 
                                                            onClick={() => applyShortcut(cat, st)} 
                                                            className="px-2 md:px-4 py-2 bg-slate-50 hover:bg-slate-100 dark:bg-slate-800 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg text-[10px] md:text-xs font-bold text-slate-600 dark:text-slate-300 transition-all flex items-center justify-center gap-1.5 shadow-sm overflow-hidden"
                                                        >
                                                            <Icons.Zap className="w-3 h-3 text-yellow-500 shrink-0"/> 
                                                            <span className="truncate">{cat.replace('Pagamento ', '')} {st.split(' ')[0]}</span>
                                                        </button>
                                                    ))
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    <form onSubmit={handleSubmit} className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                                            <div className="space-y-2">
                                                <label className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-widest">Data</label>
                                                <DateInput required value={date} onChange={e => setDate(e.target.value)} className="material-input w-full px-4 md:px-5 py-3 md:py-3.5 rounded-xl text-slate-900 font-semibold text-sm md:text-base" />
                                            </div>

                                            <div className="space-y-2">
                                                <label className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-widest">Categoria</label>
                                                <div className="relative group">
                                                    <select required value={category} onChange={e => setCategory(e.target.value)} className="material-input w-full px-4 md:px-5 py-3 md:py-3.5 rounded-xl appearance-none text-slate-900 font-semibold cursor-pointer text-sm md:text-base">
                                                        <option value="" disabled>Selecione...</option>
                                                        {settings.categories.map((c, i) => <option key={i} value={c.label}>{c.label}</option>)}
                                                    </select>
                                                    <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 group-focus-within:text-blue-500"><Icons.Tag className="w-4 h-4 md:w-5 md:h-5" /></div>
                                                </div>
                                            </div>

                                            <div className="space-y-2">
                                                <label className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-widest">Loja / Grupo</label>
                                                <div className="relative group">
                                                    <select required value={store} onChange={e => setStore(e.target.value)} className="material-input w-full px-4 md:px-5 py-3 md:py-3.5 rounded-xl appearance-none text-slate-900 font-semibold cursor-pointer text-sm md:text-base">
                                                        <option value="" disabled>Selecione...</option>
                                                        {STORES_LIST.map((l, i) => <option key={i} value={l}>{l}</option>)}
                                                    </select>
                                                    <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 group-focus-within:text-blue-500"><Icons.Store className="w-4 h-4 md:w-5 md:h-5" /></div>
                                                </div>
                                            </div>

                                            <div className="space-y-2">
                                                <label className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-widest">Valor ({settings.currency})</label>
                                                <div className="relative group">
                                                    <input type="text" ref={amountInputRef} inputMode="numeric" required placeholder="0,00" value={amount} onChange={handleAmountChange} className="material-input w-full pl-5 pr-14 py-3 md:py-3.5 rounded-xl text-blue-600 dark:text-blue-400 font-extrabold text-lg md:text-xl tracking-tight" />
                                                     <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 group-focus-within:text-blue-500"><Icons.DollarSign className="w-4 h-4 md:w-5 md:h-5" /></div>
                                                </div>
                                            </div>

                                            <div className="space-y-2 md:col-span-2">
                                                <label className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-widest">Observações (Opcional)</label>

                                        </div>

                                            {isSaving ? <Icons.Clock className="w-5 h-5 animate-spin"/> : editingId ? <Icons.Check className="w-5 h-5"/> : <Icons.Plus className="w-5 h-5"/>}
                                            {isSaving ? "Salvando..." : editingId ? "Salvar Alterações" : "Adicionar Lançamento"}
                                        </button>
                                    </form>
                                </div>

                                {expenses.length > 0 && (
                                    <div className="material-panel p-6 md:p-10 print:border-none print:shadow-none print:p-0 print:mb-6">
